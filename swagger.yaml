openapi: 3.0.3
info:
  title: E-Commerce Eurostar API
  description: |
    In-memory e-commerce REST API with JWT authentication and checkout.

    **Checkout rules:**
    - Payment methods: `cash` or `credit_card` only
    - Cash payments receive a 10% discount on the subtotal
    - Checkout requires a valid JWT Bearer token
  version: 1.0.0

servers:
  - url: http://localhost:3000/api
    description: Local development server

tags:
  - name: Health
    description: API health monitoring
  - name: Auth
    description: User registration and authentication
  - name: Checkout
    description: Order checkout (authenticated)

paths:
  /healthcheck:
    get:
      tags:
        - Health
      summary: Healthcheck
      description: Verify the API is running.
      operationId: healthcheck
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                timestamp: '2026-06-15T12:00:00.000Z'

  /register:
    post:
      tags:
        - Auth
      summary: Register
      description: Create a new user account and receive a JWT token.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: newuser@example.com
              password: securepass
              name: New User
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /login:
    post:
      tags:
        - Auth
      summary: Login
      description: Authenticate an existing user and receive a JWT token.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: alice@example.com
              password: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /checkout:
    post:
      tags:
        - Checkout
      summary: Checkout
      description: |
        Place an order. Requires authentication.

        - `cash` applies a 10% discount on the subtotal
        - `credit_card` has no discount
      operationId: checkout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
            example:
              items:
                - productId: 1
                  quantity: 2
                - productId: 3
                  quantity: 1
              paymentMethod: cash
      responses:
        '200':
          description: Checkout completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
        '400':
          description: Invalid request, payment method, or insufficient stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login or register

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
      required:
        - status
        - timestamp

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        name:
          type: string
      required:
        - email
        - password
        - name

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        name:
          type: string
      required:
        - id
        - email
        - name

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          description: JWT access token
      required:
        - user
        - token

    CheckoutItem:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
          minimum: 1
      required:
        - productId
        - quantity

    CheckoutRequest:
      type: object
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CheckoutItem'
        paymentMethod:
          type: string
          enum:
            - cash
            - credit_card
      required:
        - items
        - paymentMethod

    OrderItem:
      type: object
      properties:
        productId:
          type: integer
        name:
          type: string
        unitPrice:
          type: number
          format: float
        quantity:
          type: integer
        lineTotal:
          type: number
          format: float

    Order:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        paymentMethod:
          type: string
          enum:
            - cash
            - credit_card
        subtotal:
          type: number
          format: float
        discount:
          type: number
          format: float
        total:
          type: number
          format: float

    CheckoutResponse:
      type: object
      properties:
        message:
          type: string
        order:
          $ref: '#/components/schemas/Order'
        customer:
          $ref: '#/components/schemas/User'

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
